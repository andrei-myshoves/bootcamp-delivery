name: CI

on:
    pull_request:
        branches:
            - dev
            - main

jobs:
    checks:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Debug npm
              run: |
                  node -v
                  npm -v
                  npm config list
                  npm ls @emnapi/runtime || true
                  npm ls @emnapi/core || true

            - name: Install dependencies
              run: npm ci

            - name: Run ESLint
              run: npm run lint

            - name: Run Stylelint
              run: npm run lint:css

            - name: Check Prettier formatting
              run: npm run format:check

            - name: Build project
              run: npm run build

            - name: Start Storybook
              run: npm run storybook -- --ci &

            - name: Wait for Storybook
              run: npx wait-on http://127.0.0.1:6006

            - name: Install Playwright browsers
              run: npx playwright install --with-deps chromium

            - name: Run Storybook Test Runner
              run: npm run test-storybook

            - name: Run visual (screenshot) tests
              run: npm run ci:test:visual

            - name: Upload visual diffs & report
              if: failure()
              uses: actions/upload-artifact@v4
              with:
                  name: visual-report
                  path: |
                      .storybook/screenshots/.diffs
                      .storybook/screenshots/report
                  if-no-files-found: ignore
